<!doctype html>
<!--
  R15 W15.7 (N-R15-25): `lang="zh"` matches `src/i18n/I18nProvider.tsx`
  `loadLang()`'s first-launch default. Pre-W15.7 this was `lang="en"`,
  causing the document to advertise English to the OS / assistive
  tech for the pre-mount frame before React's mount-time effect
  overrode the attribute — first-launch users (most common case)
  saw a brief English→Chinese flip plus an a11y-incorrect lang
  signal. I18nProvider keeps ownership at runtime via its useEffect
  (handles user toggling lang via the header switch); this static
  default just aligns the initial frame with the storage-persisted
  default. If `loadLang()`'s default changes, this static must
  track it.
-->
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="SDR subtitle to HDR color space converter with font embedding and timing tools."
    />
    <title>SSA HDRify</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
